<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>Student Info</title>
  
  <link rel="manifest" href="manifest.json">
  
  <style>
    body, html { 
      margin: 0; padding: 0; height: 100vh; width: 100vw; 
      overflow: hidden; background-color: #f0f2f5; font-family: sans-serif; 
    }
    iframe { 
      width: 100%; height: 100%; border: none; display: block; 
    }
    #install-banner {
      display: none; position: fixed; bottom: 0; left: 0; width: 100%;
      background: #ffffff; box-shadow: 0 -4px 15px rgba(0,0,0,0.15);
      padding: 24px 20px; box-sizing: border-box; z-index: 9999;
      text-align: center; border-top-left-radius: 20px; border-top-right-radius: 20px;
    }
    #install-btn {
      background: #4285f4; color: white; border: none; padding: 14px 24px;
      font-size: 16px; font-weight: bold; border-radius: 8px; width: 100%; 
      cursor: pointer; margin-bottom: 12px;
    }
    #close-btn { 
      background: none; border: none; color: #888; font-size: 14px; 
      text-decoration: underline; cursor: pointer; padding: 5px;
    }
  </style>
</head>
<body>

  <iframe src="https://script.google.com/macros/s/AKfycbywkEBu0FrNKg9zh-DJFY-krq0LiCFneeZlA_R3Ina1RM9RX4uzzij8fF5CCcCKGXA1/exec"></iframe>

  <div id="install-banner">
    <h3 style="margin: 0 0 8px 0;">Install Portal App</h3>
    <p style="margin: 0 0 16px 0; color: #666; font-size: 14px;">Add this portal to your home screen for quick 1-tap access.</p>
    <button id="install-btn">Install App Now</button><br>
    <button id="close-btn">Not right now</button>
  </div>

  <script>
    // Register the permanent service worker file
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log("Service Worker Active"))
        .catch(err => console.log("Service Worker Failed", err));
    }

    let deferredPrompt;
    const banner = document.getElementById('install-banner');
    const installBtn = document.getElementById('install-btn');
    const closeBtn = document.getElementById('close-btn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      
      // Show the native banner automatically after 2 seconds if not previously installed
      if (!localStorage.getItem('plm_app_installed')) {
        setTimeout(() => {
          banner.style.display = 'block';
        }, 2000);
      }
    });

    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          localStorage.setItem('plm_app_installed', 'true');
          banner.style.display = 'none';
        }
        deferredPrompt = null;
      }
    });

    closeBtn.addEventListener('click', () => {
      banner.style.display = 'none';
    });
  </script>
</body>
</html>
